<svg viewBox="0 0 760 300" width="760" height="300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <!-- JST SM wire-to-wire ID card. -->
  <rect x="0.5" y="0.5" width="759" height="299" rx="10" fill="#ffffff" stroke="#d0d7de"/>
  <text x="380" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#102040">JST SM — ID marks (wire-to-wire)</text>

  <!-- Plug (left) with latch on top -->
  <g stroke="#102040" stroke-width="2" fill="#f4f7fb">
    <rect x="90" y="130" width="120" height="56" rx="6"/>
    <!-- latch arm -->
    <path d="M118 130 l8 -14 h48 l8 14" fill="#f4f7fb"/>
  </g>
  <!-- pins protruding -->
  <g stroke="#102040" stroke-width="1.5" fill="#ffffff">
    <rect x="210" y="144" width="18" height="6"/>
    <rect x="210" y="166" width="18" height="6"/>
  </g>
  <!-- wires left -->
  <line x1="90" y1="147" x2="46" y2="147" stroke="#3d6094" stroke-width="6" stroke-linecap="round"/>
  <line x1="90" y1="169" x2="46" y2="169" stroke="#3d6094" stroke-width="6" stroke-linecap="round"/>

  <!-- Receptacle (right) with latch window -->
  <g stroke="#102040" stroke-width="2" fill="#f4f7fb">
    <rect x="258" y="126" width="130" height="64" rx="6"/>
    <rect x="292" y="118" width="52" height="8" rx="2" fill="#ffffff"/>
  </g>
  <!-- cavities facing plug -->
  <g stroke="#102040" stroke-width="1.5" fill="#ffffff">
    <rect x="258" y="142" width="12" height="10"/>
    <rect x="258" y="164" width="12" height="10"/>
  </g>
  <!-- wires right -->
  <line x1="388" y1="147" x2="432" y2="147" stroke="#3d6094" stroke-width="6" stroke-linecap="round"/>
  <line x1="388" y1="169" x2="432" y2="169" stroke="#3d6094" stroke-width="6" stroke-linecap="round"/>

  <!-- mate arrows -->
  <line x1="232" y1="205" x2="256" y2="205" stroke="#9a3412" stroke-width="1.5"/>
  <path d="M256 205 l-7 -4 v8 z" fill="#9a3412"/>
  <text x="238" y="224" text-anchor="middle" font-size="12" fill="#9a3412" font-weight="bold">latch clicks</text>

  <text x="240" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#102040">Inline pair in the middle of a cable — no PCB side</text>
  <text x="240" y="280" text-anchor="middle" font-size="12" fill="#3d6094">2.5 mm pitch; positive latch you press to release</text>

  <!-- Callouts right column -->
  <g font-size="12" fill="#3d6094">
    <text x="470" y="120" font-weight="bold" fill="#102040">What gives it away</text>
    <text x="470" y="144">&#8226; lives on LED strings and prewired harnesses</text>
    <text x="470" y="164">&#8226; both halves hang on wires (wire-to-wire)</text>
    <text x="470" y="184">&#8226; <tspan fill="#9a3412" font-weight="bold">the red 2-pin pair is usually RCY</tspan>, a</text>
    <text x="478" y="202">different series people also call &#8220;JST&#8221;</text>
    <text x="470" y="226">&#8226; check the latch style before ordering mates</text>
  </g>
</svg>

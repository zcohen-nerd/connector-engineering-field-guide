<svg viewBox="0 0 760 300" width="760" height="300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <!-- Hobby pitch measurement: measure the full row, divide by N-1. v0.9. -->
  <rect x="0.5" y="0.5" width="759" height="299" rx="10" fill="#ffffff" stroke="#d0d7de"/>
  <text x="380" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#102040">Measuring pitch: use the whole row, not one gap</text>

  <!-- Connector housing, 4 positions -->
  <g>
    <rect x="200" y="110" width="360" height="80" rx="8" fill="#f4f7fb" stroke="#102040" stroke-width="2"/>
    <!-- four contacts on a 90 px grid: centers at 245 / 335 / 425 / 515 -->
    <circle cx="245" cy="150" r="14" fill="#ffffff" stroke="#102040" stroke-width="2"/>
    <circle cx="335" cy="150" r="14" fill="#ffffff" stroke="#102040" stroke-width="2"/>
    <circle cx="425" cy="150" r="14" fill="#ffffff" stroke="#102040" stroke-width="2"/>
    <circle cx="515" cy="150" r="14" fill="#ffffff" stroke="#102040" stroke-width="2"/>
    <text x="245" y="155" text-anchor="middle" font-size="11" fill="#102040">1</text>
    <text x="335" y="155" text-anchor="middle" font-size="11" fill="#102040">2</text>
    <text x="425" y="155" text-anchor="middle" font-size="11" fill="#102040">3</text>
    <text x="515" y="155" text-anchor="middle" font-size="11" fill="#102040">4</text>
  </g>

  <!-- One-gap measurement (discouraged) -->
  <g stroke="#9a3412" fill="#9a3412">
    <line x1="245" y1="95" x2="335" y2="95" stroke-width="1.5"/>
    <line x1="245" y1="89" x2="245" y2="101" stroke-width="1.5"/>
    <line x1="335" y1="89" x2="335" y2="101" stroke-width="1.5"/>
  </g>
  <text x="290" y="80" text-anchor="middle" font-size="12" fill="#9a3412">one gap: caliper error dominates</text>

  <!-- Full-row measurement (preferred) -->
  <g stroke="#102040" fill="#102040">
    <line x1="245" y1="225" x2="515" y2="225" stroke-width="2"/>
    <line x1="245" y1="217" x2="245" y2="233" stroke-width="2"/>
    <line x1="515" y1="217" x2="515" y2="233" stroke-width="2"/>
  </g>
  <text x="380" y="252" text-anchor="middle" font-size="13" font-weight="bold" fill="#102040">measure center 1 → center 4, then ÷ (N−1) = ÷ 3</text>
  <text x="380" y="274" text-anchor="middle" font-size="12" fill="#3d6094">7.5 mm ÷ 3 = 2.5 mm pitch · 7.62 mm ÷ 3 = 2.54 mm pitch — the row length tells them apart</text>
</svg>

<svg viewBox="0 0 760 300" width="760" height="300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <!-- JST SH / Qwiic / STEMMA QT ID card. -->
  <rect x="0.5" y="0.5" width="759" height="299" rx="10" fill="#ffffff" stroke="#d0d7de"/>
  <text x="380" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#102040">JST SH (Qwiic / STEMMA QT) — ID marks</text>

  <!-- Tiny SMD side-entry connector, drawn large with a scale hint -->
  <g stroke="#102040" stroke-width="2" fill="#f4f7fb">
    <rect x="110" y="120" width="190" height="70" rx="4"/>
  </g>
  <!-- cable opening -->
  <rect x="118" y="132" width="174" height="30" rx="2" fill="#ffffff" stroke="#102040" stroke-width="1.5"/>
  <!-- 4 contacts in the opening -->
  <g stroke="#102040" stroke-width="1.2" fill="#ffffff">
    <rect x="146" y="138" width="4" height="18"/>
    <rect x="186" y="138" width="4" height="18"/>
    <rect x="226" y="138" width="4" height="18"/>
    <rect x="266" y="138" width="4" height="18"/>
  </g>
  <!-- SMD pads -->
  <g stroke="#102040" stroke-width="1.2" fill="#ffffff">
    <rect x="142" y="190" width="12" height="8"/>
    <rect x="182" y="190" width="12" height="8"/>
    <rect x="222" y="190" width="12" height="8"/>
    <rect x="262" y="190" width="12" height="8"/>
  </g>

  <!-- Pitch arrows -->
  <line x1="148" y1="112" x2="188" y2="112" stroke="#9a3412" stroke-width="1.5"/>
  <path d="M148 112 l7 -4 v8 z M188 112 l-7 -4 v8 z" fill="#9a3412"/>
  <text x="168" y="102" text-anchor="middle" font-size="12" font-weight="bold" fill="#9a3412">1.0 mm</text>

  <!-- true-size hint -->
  <rect x="110" y="232" width="24" height="9" fill="#f4f7fb" stroke="#102040" stroke-width="1"/>
  <text x="144" y="240" font-size="11" fill="#3d6094">&#8592; actual size of a 4-pin SH (drawing above is ~8&#215;)</text>

  <text x="205" y="272" text-anchor="middle" font-size="13" font-weight="bold" fill="#102040">Genuinely tiny, side-entry, friction fit</text>

  <!-- Callouts right column -->
  <g font-size="12" fill="#3d6094">
    <text x="440" y="120" font-weight="bold" fill="#102040">What gives it away</text>
    <text x="440" y="144">&#8226; 1.0 mm pitch — smallest common hobby JST</text>
    <text x="440" y="164">&#8226; 4 positions + branding usually = Qwiic / STEMMA QT</text>
    <text x="440" y="184">&#8226; <tspan fill="#9a3412" font-weight="bold">not GH</tspan> — GH is 1.25 mm with a latch arm</text>
    <text x="440" y="204">&#8226; buy pre-crimped — too small to hand-crimp well</text>
    <text x="440" y="224">&#8226; Grove is a different, larger 2.0 mm ecosystem</text>
  </g>
</svg>

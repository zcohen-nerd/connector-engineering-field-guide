<svg viewBox="0 0 760 300" width="760" height="300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <!-- JST PH ID card. -->
  <rect x="0.5" y="0.5" width="759" height="299" rx="10" fill="#ffffff" stroke="#d0d7de"/>
  <text x="380" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#102040">JST PH — ID marks</text>

  <!-- Lower-profile top-entry header -->
  <g stroke="#102040" stroke-width="2" fill="#f4f7fb">
    <rect x="100" y="200" width="180" height="22" rx="3"/>
    <path d="M107 200 v-52 h14 v38 M273 200 v-52 h-14 v38" fill="#f4f7fb"/>
  </g>
  <g stroke="#102040" stroke-width="1.5" fill="#ffffff">
    <rect x="138" y="166" width="5" height="34"/>
    <rect x="166" y="166" width="5" height="34"/>
    <rect x="194" y="166" width="5" height="34"/>
    <rect x="222" y="166" width="5" height="34"/>
  </g>
  <g stroke="#102040" stroke-width="1.5">
    <line x1="140" y1="222" x2="140" y2="238"/>
    <line x1="168" y1="222" x2="168" y2="238"/>
    <line x1="196" y1="222" x2="196" y2="238"/>
    <line x1="224" y1="222" x2="224" y2="238"/>
  </g>

  <!-- Pitch arrows -->
  <line x1="140" y1="152" x2="168" y2="152" stroke="#9a3412" stroke-width="1.5"/>
  <path d="M140 152 l6 -4 v8 z M168 152 l-6 -4 v8 z" fill="#9a3412"/>
  <text x="154" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#9a3412">2.0 mm</text>

  <!-- Size-comparison ghost: XH outline -->
  <g stroke="#3d6094" stroke-width="1.5" stroke-dasharray="4 3" fill="none">
    <rect x="100" y="72" width="110" height="36" rx="3"/>
  </g>
  <text x="218" y="94" font-size="11" fill="#3d6094">XH (2.5 mm) is visibly bigger — measure, don&#8217;t eyeball</text>

  <text x="190" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#102040">Compact, low shroud, friction fit</text>
  <text x="190" y="280" text-anchor="middle" font-size="12" fill="#3d6094">the small-battery and plain-STEMMA connector</text>

  <!-- Callouts right column -->
  <g font-size="12" fill="#3d6094">
    <text x="440" y="150" font-weight="bold" fill="#102040">What gives it away</text>
    <text x="440" y="174">&#8226; 2.0 mm pitch — between XH (2.5) and SH (1.0)</text>
    <text x="440" y="194">&#8226; friction lock, <tspan fill="#9a3412" font-weight="bold">no latch arm</tspan></text>
    <text x="440" y="214">&#8226; 1S LiPo pigtails, Adafruit-style battery ports</text>
    <text x="440" y="234">&#8226; also the plain-STEMMA port connector</text>
    <text x="440" y="254">&#8226; will never mate 1.0 mm STEMMA QT/Qwiic (SH)</text>
  </g>
</svg>

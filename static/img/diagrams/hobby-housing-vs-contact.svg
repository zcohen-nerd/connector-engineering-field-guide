<svg viewBox="0 0 760 300" width="760" height="300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <!-- Hobby: housing and contact are separate parts. v0.9. -->
  <rect x="0.5" y="0.5" width="759" height="299" rx="10" fill="#ffffff" stroke="#d0d7de"/>
  <text x="380" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#102040">A connector is (at least) two purchases: housing + contacts</text>

  <!-- Housing (left) -->
  <g>
    <rect x="90" y="90" width="200" height="110" rx="10" fill="#f4f7fb" stroke="#102040" stroke-width="2"/>
    <rect x="115" y="115" width="34" height="60" rx="4" fill="#ffffff" stroke="#102040" stroke-width="1.5"/>
    <rect x="173" y="115" width="34" height="60" rx="4" fill="#ffffff" stroke="#102040" stroke-width="1.5"/>
    <rect x="231" y="115" width="34" height="60" rx="4" fill="#ffffff" stroke="#102040" stroke-width="1.5"/>
    <!-- latch nub -->
    <rect x="160" y="78" width="60" height="12" rx="4" fill="#f4f7fb" stroke="#102040" stroke-width="1.5"/>
  </g>
  <text x="190" y="230" text-anchor="middle" font-size="13" font-weight="bold" fill="#102040">Housing</text>
  <text x="190" y="250" text-anchor="middle" font-size="12" fill="#3d6094">its own part number · empty cavities</text>
  <text x="190" y="268" text-anchor="middle" font-size="12" fill="#3d6094">pitch + latch + family-specific</text>

  <!-- Plus sign -->
  <text x="360" y="155" text-anchor="middle" font-size="34" font-weight="bold" fill="#102040">+</text>

  <!-- Open-barrel contact (right): mating end, conductor wings, insulation wings, wire -->
  <g stroke="#102040" stroke-width="2" fill="#ffffff">
    <!-- mating box -->
    <rect x="430" y="130" width="70" height="30" rx="3"/>
    <!-- conductor wings -->
    <path d="M510 145 l10 -18 M510 145 l10 18" fill="none"/>
    <path d="M530 145 l10 -18 M530 145 l10 18" fill="none"/>
    <line x1="500" y1="145" x2="545" y2="145"/>
    <!-- insulation wings -->
    <path d="M555 145 l12 -22 M555 145 l12 22" fill="none"/>
    <line x1="545" y1="145" x2="570" y2="145"/>
  </g>
  <!-- wire -->
  <line x1="570" y1="145" x2="660" y2="145" stroke="#3d6094" stroke-width="8" stroke-linecap="round"/>
  <line x1="548" y1="145" x2="572" y2="145" stroke="#9a3412" stroke-width="3"/>

  <text x="465" y="115" text-anchor="middle" font-size="11" fill="#3d6094">mating end</text>
  <text x="527" y="105" text-anchor="middle" font-size="11" fill="#9a3412">conductor wings</text>
  <text x="592" y="112" text-anchor="middle" font-size="11" fill="#3d6094">insulation wings</text>
  <text x="550" y="230" text-anchor="middle" font-size="13" font-weight="bold" fill="#102040">Contact (terminal)</text>
  <text x="550" y="250" text-anchor="middle" font-size="12" fill="#3d6094">its own part number · crimped to the wire</text>
  <text x="550" y="268" text-anchor="middle" font-size="12" fill="#3d6094">must match the housing's family — no kit-drawer mixing</text>
</svg>

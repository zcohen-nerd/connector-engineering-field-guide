name: deploy-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      # Wandalen/wretry.action doesn't pass the wrapped action's named outputs
      # straight through — it bundles them into one JSON-string `outputs`
      # output, so page_url has to be pulled back out with fromJSON().
      url: ${{ fromJSON(steps.deployment.outputs.outputs).page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # actions/deploy-pages@v4 hard-caps its own `timeout` input at 600000ms
        # (10 min), so raising it doesn't help. The actual failure mode is
        # transient GitHub Pages backend errors ("Deployment failed, try again
        # later." or a stalled deployment_queued) — retrying the step is what
        # GitHub's own error message recommends, so wrap it instead.
        uses: Wandalen/wretry.action@v3.8.0
        with:
          action: actions/deploy-pages@v4
          attempt_limit: 3
          attempt_delay: 20000

<svg viewBox="0 0 760 300" width="760" height="300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <!-- MIL-DTL-38999 Series III profile ID card. -->
  <rect x="0.5" y="0.5" width="759" height="299" rx="10" fill="#ffffff" stroke="#d0d7de"/>
  <text x="380" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#102040">MIL-DTL-38999 Series III — what you&#8217;re looking at</text>

  <!-- Receptacle (left): square flange, threaded barrel, pins -->
  <g stroke="#102040" stroke-width="2" fill="#f4f7fb">
    <rect x="70" y="106" width="16" height="88" rx="2"/>
    <rect x="86" y="122" width="60" height="56"/>
  </g>
  <!-- flange holes -->
  <circle cx="78" cy="116" r="4" fill="#ffffff" stroke="#102040" stroke-width="1.2"/>
  <circle cx="78" cy="184" r="4" fill="#ffffff" stroke="#102040" stroke-width="1.2"/>
  <!-- thread hint on barrel -->
  <g stroke="#3d6094" stroke-width="1.2">
    <line x1="94" y1="122" x2="94" y2="178"/>
    <line x1="104" y1="122" x2="104" y2="178"/>
    <line x1="114" y1="122" x2="114" y2="178"/>
    <line x1="124" y1="122" x2="124" y2="178"/>
    <line x1="134" y1="122" x2="134" y2="178"/>
  </g>
  <!-- pins -->
  <g stroke="#102040" stroke-width="1.5">
    <line x1="146" y1="136" x2="162" y2="136"/>
    <line x1="146" y1="150" x2="162" y2="150"/>
    <line x1="146" y1="164" x2="162" y2="164"/>
  </g>
  <text x="108" y="222" text-anchor="middle" font-size="12" fill="#3d6094">panel receptacle</text>
  <text x="108" y="238" text-anchor="middle" font-size="12" fill="#3d6094">(square flange)</text>

  <!-- Plug (right): shell, knurled coupling nut, backshell threads -->
  <g stroke="#102040" stroke-width="2" fill="#f4f7fb">
    <rect x="210" y="128" width="44" height="44" rx="3"/>
    <rect x="254" y="116" width="86" height="68" rx="6"/>
    <rect x="340" y="130" width="56" height="40" rx="3"/>
  </g>
  <!-- knurl on coupling nut -->
  <g stroke="#3d6094" stroke-width="1.2">
    <line x1="262" y1="116" x2="262" y2="184"/>
    <line x1="274" y1="116" x2="274" y2="184"/>
    <line x1="286" y1="116" x2="286" y2="184"/>
    <line x1="298" y1="116" x2="298" y2="184"/>
    <line x1="310" y1="116" x2="310" y2="184"/>
    <line x1="322" y1="116" x2="322" y2="184"/>
    <line x1="332" y1="116" x2="332" y2="184"/>
  </g>
  <!-- cable -->
  <line x1="396" y1="150" x2="452" y2="150" stroke="#3d6094" stroke-width="10" stroke-linecap="round"/>
  <text x="300" y="222" text-anchor="middle" font-size="12" fill="#3d6094">plug with knurled coupling nut + backshell</text>

  <!-- Callouts -->
  <line x1="297" y1="112" x2="330" y2="84" stroke="#3d6094" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="336" y="80" font-size="12" fill="#3d6094">Tri-Start thread: full mate in ~1 turn, self-locking</text>

  <g font-size="12" fill="#3d6094">
    <text x="486" y="120" font-weight="bold" fill="#102040">What gives it away</text>
    <text x="486" y="144">&#8226; scoop-proof shell — recessed pins</text>
    <text x="486" y="164">&#8226; witness bands on the coupling nut</text>
    <text x="486" y="184">&#8226; keyway set (N, A&#8211;E) clocks the mate</text>
    <text x="486" y="204">&#8226; rear-release crimp contacts</text>
    <text x="486" y="232" font-weight="bold" fill="#9a3412">Decode the full P/N — shell, insert,</text>
    <text x="486" y="250" font-weight="bold" fill="#9a3412">key, and finish all matter</text>
  </g>
</svg>

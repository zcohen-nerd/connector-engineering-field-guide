<svg viewBox="0 0 760 330" width="760" height="330" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <!-- D38999 Series III alternate keying positions N/A/B/C/D/E. Issue #45.
       Minor-keyway angles are the shell-size 17/19 receptacle BSC values from the
       Amphenol Series III master key/keyway table (AC38907 p.7), drawn clockwise
       from the fixed master keyway at 12 o'clock. -->
  <rect x="0.5" y="0.5" width="759" height="329" rx="10" fill="#ffffff" stroke="#d0d7de"/>
  <text x="380" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#102040">D38999 keying: master keyway fixed, minor keyways rotate per position</text>

  <!-- N: 80,142,196,293 -->
  <g transform="translate(75,130)">
    <circle r="46" fill="#f4f7fb" stroke="#102040" stroke-width="2"/>
    <circle r="31" fill="#ffffff" stroke="#9db0c7" stroke-width="1.5"/>
    <rect x="-7" y="-54" width="14" height="14" fill="#f4f7fb" stroke="#102040" stroke-width="1.5"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(80)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(142)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(196)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(293)"/>
  </g>
  <text x="75" y="212" text-anchor="middle" font-size="17" font-weight="bold" fill="#102040">N</text>
  <text x="75" y="230" text-anchor="middle" font-size="12" fill="#3b4453">(normal)</text>

  <!-- A: 135,170,200,310 -->
  <g transform="translate(197,130)">
    <circle r="46" fill="#f4f7fb" stroke="#102040" stroke-width="2"/>
    <circle r="31" fill="#ffffff" stroke="#9db0c7" stroke-width="1.5"/>
    <rect x="-7" y="-54" width="14" height="14" fill="#f4f7fb" stroke="#102040" stroke-width="1.5"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(135)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(170)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(200)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(310)"/>
  </g>
  <text x="197" y="212" text-anchor="middle" font-size="17" font-weight="bold" fill="#102040">A</text>

  <!-- B: 49,169,200,244 -->
  <g transform="translate(319,130)">
    <circle r="46" fill="#f4f7fb" stroke="#102040" stroke-width="2"/>
    <circle r="31" fill="#ffffff" stroke="#9db0c7" stroke-width="1.5"/>
    <rect x="-7" y="-54" width="14" height="14" fill="#f4f7fb" stroke="#102040" stroke-width="1.5"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(49)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(169)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(200)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(244)"/>
  </g>
  <text x="319" y="212" text-anchor="middle" font-size="17" font-weight="bold" fill="#102040">B</text>

  <!-- C: 66,140,200,257 -->
  <g transform="translate(441,130)">
    <circle r="46" fill="#f4f7fb" stroke="#102040" stroke-width="2"/>
    <circle r="31" fill="#ffffff" stroke="#9db0c7" stroke-width="1.5"/>
    <rect x="-7" y="-54" width="14" height="14" fill="#f4f7fb" stroke="#102040" stroke-width="1.5"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(66)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(140)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(200)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(257)"/>
  </g>
  <text x="441" y="212" text-anchor="middle" font-size="17" font-weight="bold" fill="#102040">C</text>

  <!-- D: 62,145,180,280 -->
  <g transform="translate(563,130)">
    <circle r="46" fill="#f4f7fb" stroke="#102040" stroke-width="2"/>
    <circle r="31" fill="#ffffff" stroke="#9db0c7" stroke-width="1.5"/>
    <rect x="-7" y="-54" width="14" height="14" fill="#f4f7fb" stroke="#102040" stroke-width="1.5"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(62)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(145)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(180)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(280)"/>
  </g>
  <text x="563" y="212" text-anchor="middle" font-size="17" font-weight="bold" fill="#102040">D</text>

  <!-- E: 79,153,197,272 -->
  <g transform="translate(685,130)">
    <circle r="46" fill="#f4f7fb" stroke="#102040" stroke-width="2"/>
    <circle r="31" fill="#ffffff" stroke="#9db0c7" stroke-width="1.5"/>
    <rect x="-7" y="-54" width="14" height="14" fill="#f4f7fb" stroke="#102040" stroke-width="1.5"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(79)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(153)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(197)"/>
    <line y1="-32" y2="-50" stroke="#0b7e96" stroke-width="3" transform="rotate(272)"/>
  </g>
  <text x="685" y="212" text-anchor="middle" font-size="17" font-weight="bold" fill="#102040">E</text>

  <text x="380" y="266" text-anchor="middle" font-size="13" font-style="italic" fill="#3b4453">Minor-keyway angles shown are the shell-size 17/19 receptacle BSC values from the manufacturer master-key table;</text>
  <text x="380" y="284" text-anchor="middle" font-size="13" font-style="italic" fill="#3b4453">angles differ by shell size — decode from the catalog. Both halves must carry the same position letter to mate.</text>
  <text x="380" y="310" text-anchor="middle" font-size="12" fill="#6f8bb4">Master keyway (top, dark) is fixed; cyan ticks = minor keyways.</text>
</svg>
